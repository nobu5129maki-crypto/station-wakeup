<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- HTMLのhead部分をこのように修正してください -->
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
    <title>駅到着アラーム - アナウンス検知</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .vibrate-active {
            animation: shake 0.5s infinite;
            background-color: #ef4444 !important;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6 font-sans">

    <div class="max-w-md w-full space-y-8 mt-10">
        <header class="text-center">
            <h1 class="text-3xl font-bold text-blue-400">Station WakeUp</h1>
            <p class="text-slate-400 mt-2 text-sm">車内アナウンスを聞き取り、目的地の手前で起こします</p>
        </header>

        <!-- Status Display -->
        <div id="debugStatus" class="bg-slate-800 p-3 rounded-lg text-xs font-mono text-slate-400 border border-slate-700">
            System: <span id="systemMsg" class="text-yellow-500">Initializing...</span>
        </div>

        <!-- Setting Section -->
        <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2 text-blue-300">検知する駅名 (例: 品川、次、まもなく)</label>
                <input type="text" id="targetStation" placeholder="駅名を入力" 
                    class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
                <p class="text-xs text-slate-500 mt-2">※「次は」「まもなく」などを入れると検知しやすくなります</p>
                <div class="mt-3">
                    <p id="savedLabel" class="text-xs text-slate-500 mb-2 hidden">よく使う駅（タップで選択 / ×で削除）</p>
                    <div id="savedStationsWrap" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <label class="flex items-center gap-2 mt-2 text-sm text-slate-300 cursor-pointer select-none">
                <input type="checkbox" id="vibrateToggle" class="rounded border-slate-600 bg-slate-700 text-blue-500 focus:ring-blue-500">
                <span>バイブレーションで知らせる（対応端末／通知許可で補完）</span>
            </label>
            <button id="toggleBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2 text-lg shadow-lg mt-4">
                <span id="statusIcon">🎤</span>
                <span id="statusText">監視を開始する</span>
            </button>
        </div>

        <!-- Transcript Log -->
        <div class="bg-black/30 p-4 rounded-xl border border-slate-700 h-40 flex flex-col">
            <h2 class="text-xs uppercase tracking-widest text-slate-500 mb-2 font-bold">聞き取り中の音声データ</h2>
            <div id="transcriptLog" class="overflow-y-auto flex-1 text-sm text-slate-300 space-y-1 font-mono">
                <p class="italic text-slate-500 text-center mt-4">開始ボタンを押すと聞き取りを開始します...</p>
            </div>
        </div>

        <!-- Alarm Modal -->
        <div id="alarmPanel" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-6">
            <div id="alarmBox" class="bg-slate-800 w-full max-w-sm p-8 rounded-3xl text-center border-4 border-red-500 shadow-[0_0_50px_rgba(239,68,68,0.5)]">
                <div class="text-6xl mb-4">🔔</div>
                <h2 class="text-2xl font-bold text-red-500 mb-2">駅に到着します！</h2>
                <p id="matchText" class="text-xl mb-6 font-semibold"></p>
                <button id="stopAlarmBtn" class="w-full bg-red-600 py-4 rounded-xl font-bold text-xl hover:bg-red-500 active:scale-95 transition-transform">
                    アラームを止める
                </button>
            </div>
        </div>

        <footer class="text-center text-slate-500 text-xs pb-10">
            <p>※ 監視開始前に一度画面をタップし、必要ならブラウザの通知を許可してください（PWAでバイブが鳴らない環境の補完に使います）。</p>
            <p>※ iPhone(iOS)では Web のバイブや通知による振動が制限される場合があります。</p>
        </footer>
    </div>

    <script>
        const targetInput = document.getElementById('targetStation');
        const toggleBtn = document.getElementById('toggleBtn');
        const savedStationsWrap = document.getElementById('savedStationsWrap');
        const savedLabel = document.getElementById('savedLabel');

        const STORAGE_KEY = 'stationWakeUp_savedStations';
        const MAX_SAVED = 15;

        function loadSavedStations() {
            try {
                const json = localStorage.getItem(STORAGE_KEY);
                return json ? JSON.parse(json) : [];
            } catch { return []; }
        }

        function saveStation(name) {
            const trimmed = name.trim();
            if (!trimmed) return;
            let list = loadSavedStations().filter(s => s !== trimmed);
            list.unshift(trimmed);
            list = list.slice(0, MAX_SAVED);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
            renderSavedStations();
        }

        function removeSavedStation(name) {
            let list = loadSavedStations().filter(s => s !== name);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
            renderSavedStations();
        }

        function renderSavedStations() {
            const list = loadSavedStations();
            savedLabel.classList.toggle('hidden', list.length === 0);
            savedStationsWrap.innerHTML = list.map(name => {
                const safe = String(name).replace(/"/g, '&quot;');
                return `<span class="saved-chip inline-flex items-center gap-1 bg-slate-600 hover:bg-slate-500 rounded-full px-3 py-1.5 text-sm cursor-pointer transition-colors" data-station="${safe}">
                    <span>${escapeHtml(name)}</span>
                    <button type="button" class="remove-btn opacity-60 hover:opacity-100 text-slate-300 hover:text-red-400 text-base leading-none w-5 h-5 flex items-center justify-center rounded-full hover:bg-slate-600" aria-label="削除">×</button>
                </span>`;
            }).join('');
            savedStationsWrap.querySelectorAll('.saved-chip').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.remove-btn')) return;
                    targetInput.value = el.dataset.station || '';
                    targetInput.focus();
                });
            });
            savedStationsWrap.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const name = btn.closest('.saved-chip').dataset.station || '';
                    removeSavedStation(name);
                });
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        const statusText = document.getElementById('statusText');
        const systemMsg = document.getElementById('systemMsg');
        const transcriptLog = document.getElementById('transcriptLog');
        const alarmPanel = document.getElementById('alarmPanel');
        const alarmBox = document.getElementById('alarmBox');
        const matchText = document.getElementById('matchText');
        const stopAlarmBtn = document.getElementById('stopAlarmBtn');
        const vibrateToggle = document.getElementById('vibrateToggle');

        const VIBRATE_PREF_KEY = 'stationWakeUp_vibrateEnabled';

        function isVibratePrefOn() {
            try {
                const v = localStorage.getItem(VIBRATE_PREF_KEY);
                if (v === null) return true;
                return v === '1';
            } catch {
                return true;
            }
        }

        function setVibratePref(on) {
            try {
                localStorage.setItem(VIBRATE_PREF_KEY, on ? '1' : '0');
            } catch { /* ignore */ }
        }

        let isListening = false;
        let recognition = null;
        let restartTimer = null;
        let retryStartTimer = null;
        let vibrationInterval = null;
        let alarmNotificationRef = null;
        let notifyRepeatTimer = null;

        const ALARM_NOTIFY_TAG = 'station-wakeup-alarm';

        function registerServiceWorkerForAlarms() {
            if (!('serviceWorker' in navigator) || !window.isSecureContext) return;
            navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(() => {});
        }
        registerServiceWorkerForAlarms();

        function closeAlarmNotificationsAndPageInstance() {
            if (alarmNotificationRef) {
                try { alarmNotificationRef.close(); } catch (e) { /* ignore */ }
                alarmNotificationRef = null;
            }
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.ready
                    .then((reg) => reg.getNotifications({ tag: ALARM_NOTIFY_TAG }))
                    .then((list) => list.forEach((n) => { try { n.close(); } catch (e) { /* ignore */ } }))
                    .catch(() => {});
            }
        }

        /** Android 等では Service Worker 経由の showNotification の vibrate の方が、ページからの vibrate より確実な場合がある */
        function showAlarmHapticNotification() {
            if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
            const title = '駅に到着します';
            const options = {
                body: 'アラームが鳴っています。アプリに戻って「アラームを止める」を押してください。',
                tag: ALARM_NOTIFY_TAG,
                requireInteraction: true,
                renotify: true,
                vibrate: [450, 220, 450, 220, 450, 220, 450, 220, 450],
                silent: false,
                icon: './icon.svg',
                badge: './icon.svg',
            };

            const viaPage = () => {
                try {
                    alarmNotificationRef = new Notification(title, options);
                } catch (e) { /* ignore */ }
            };

            if ('serviceWorker' in navigator && window.isSecureContext) {
                const timeoutMs = 4000;
                const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('sw-ready-timeout')), timeoutMs));
                Promise.race([navigator.serviceWorker.ready, timeout])
                    .then((reg) => reg.showNotification(title, options))
                    .catch(viaPage);
            } else {
                viaPage();
            }
        }

        const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
        /** セッション終了後に次を起動するまでの待ち（短すぎると InvalidStateError） */
        const RESTART_MS = 600;
        /** Chrome 等で約10〜20分で内部セッションが不安定になりやすいため、定期的に認識インスタンスを作り直す */
        const INSTANCE_TTL_MS = 8 * 60 * 1000;
        /** start() がコケたときの再試行（新インスタンス） */
        const MAX_START_RETRIES = 5;
        /** 前回インスタンス生成から8分経過したら、次の onend で1回だけ作り直す */
        let lastInstanceCreatedAt = 0;
        /** 今回の「監視中」に一度でも onstart したか（初回拒否と再開前の一時 not-allowed を分ける） */
        let hadRecognitionOnStart = false;

        function clearSpeechTimers() {
            clearTimeout(restartTimer);
            clearTimeout(retryStartTimer);
            restartTimer = null;
            retryStartTimer = null;
        }

        function attachRecognition(rec) {
            rec.lang = 'ja-JP';
            rec.continuous = true;
            rec.interimResults = true;
            try {
                rec.maxAlternatives = 5;
            } catch (e) { /* 未対応ブラウザ */ }

            rec.onstart = () => {
                hadRecognitionOnStart = true;
                systemMsg.textContent = "Listening...";
                systemMsg.className = "text-blue-400";
            };

            rec.onresult = (event) => {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const res = event.results[i];
                    const isFinal = res.isFinal;
                    const parts = [];
                    for (let a = 0; a < res.length; a++) {
                        const t = res[a].transcript;
                        if (t && t.trim()) {
                            parts.push(t.trim());
                            checkMatch(t);
                        }
                    }
                    if (parts.length) {
                        const line = parts.join(' ');
                        updateLog(line, isFinal);
                        checkMatch(line);
                    }
                }
            };

            rec.onend = () => {
                if (isListening) {
                    clearTimeout(retryStartTimer);
                    systemMsg.textContent = "Auto-Restarting...";
                    systemMsg.className = "text-yellow-500";
                    clearTimeout(restartTimer);
                    if (Date.now() - lastInstanceCreatedAt >= INSTANCE_TTL_MS) {
                        recognition = createRecognition();
                        lastInstanceCreatedAt = Date.now();
                    }
                    restartTimer = setTimeout(() => {
                        if (isListening) tryStartRecognition(0, { fromUserClick: false });
                    }, RESTART_MS);
                } else {
                    systemMsg.textContent = "Stopped";
                    systemMsg.className = "text-slate-400";
                }
            };

            rec.onerror = (event) => {
                if (event.error === 'no-speech' || event.error === 'aborted') {
                    return;
                }
                if (isListening && event.error === 'not-allowed' && hadRecognitionOnStart) {
                    systemMsg.textContent = "再接続中…";
                    systemMsg.className = "text-yellow-500";
                    return;
                }
                if (isListening && event.error === 'network') {
                    systemMsg.textContent = "ネットワークの不調です。自動で再接続します…";
                    systemMsg.className = "text-yellow-500";
                    return;
                }
                if (isListening) {
                    let msg = `Error: ${event.error}`;
                    if (event.error === 'not-allowed') {
                        msg = 'マイクが許可されていません。ブラウザの設定でマイクを許可するか、HTTPSで開いてください。';
                    } else if (event.error === 'audio-capture') {
                        msg = 'マイクが使用できません。他のアプリが使用中か確認してください。';
                    } else if (event.error === 'service-not-allowed') {
                        msg = '音声認識サービスに接続できません。しばらくしてから再試行するか、通信環境を確認してください。';
                    }
                    systemMsg.textContent = msg;
                    systemMsg.className = "text-red-500";
                }
                console.warn('Speech Recognition Error:', event.error);
            };
        }

        function createRecognition() {
            if (!SpeechRecognitionCtor) return null;
            const rec = new SpeechRecognitionCtor();
            attachRecognition(rec);
            return rec;
        }

        /** recognition.start() は長時間後や直前の stop 直後に例外になることがあるため再試行する */
        function tryStartRecognition(attempt, opts) {
            const fromUserClick = opts && opts.fromUserClick;
            if (!isListening || !SpeechRecognitionCtor) return;
            if (!recognition) recognition = createRecognition();
            if (!recognition) return;
            try {
                recognition.start();
            } catch (e) {
                console.warn('recognition.start failed', attempt, e);
                if (attempt < MAX_START_RETRIES) {
                    recognition = createRecognition();
                    retryStartTimer = setTimeout(() => {
                        tryStartRecognition(attempt + 1, opts);
                    }, 350 + attempt * 200);
                } else if (fromUserClick) {
                    isListening = false;
                    statusText.textContent = '監視を開始する';
                    toggleBtn.classList.remove('pulse');
                    toggleBtn.classList.replace('bg-red-600', 'bg-blue-600');
                    systemMsg.textContent = '音声認識を開始できませんでした。ページを一度再読み込みするか、しばらくしてからもう一度お試しください。';
                    systemMsg.className = "text-red-500";
                } else {
                    recognition = createRecognition();
                    systemMsg.textContent = "認識の再接続に失敗しました。自動で再試行しています…";
                    systemMsg.className = "text-yellow-500";
                    retryStartTimer = setTimeout(() => {
                        if (!isListening) return;
                        tryStartRecognition(0, { fromUserClick: false });
                    }, 3000);
                }
            }
        }

        if (SpeechRecognitionCtor) {
            recognition = createRecognition();

            if (!window.isSecureContext) {
                systemMsg.textContent = "⚠️ HTTPSで開いてください（file://ではマイクが使えません）";
                systemMsg.className = "text-amber-500";
            } else {
                systemMsg.textContent = "Ready";
                systemMsg.className = "text-green-500";
            }
        }

        function updateLog(text, isFinal) {
            const firstChild = transcriptLog.firstChild;
            if (firstChild && !firstChild.dataset.final) {
                firstChild.textContent = `> ${text}`;
                if (isFinal) {
                    firstChild.dataset.final = "true";
                    firstChild.classList.replace('text-slate-400', 'text-slate-200');
                }
            } else {
                const p = document.createElement('p');
                p.textContent = `> ${text}`;
                p.className = isFinal ? 'text-slate-200 border-l-2 border-blue-500 pl-2' : 'text-slate-400 border-l-2 border-slate-600 pl-2';
                if (isFinal) p.dataset.final = "true";
                transcriptLog.prepend(p);
            }
            if (transcriptLog.childNodes.length > 25) transcriptLog.removeChild(transcriptLog.lastChild);
        }

        /** 漢字・カタカナ・ひらがなの表記ゆれを吸収して比較用に正規化 */
        function normalizeForMatch(str) {
            let s = typeof str.normalize === 'function' ? str.normalize('NFKC') : str;
            // カタカナ → ひらがな（Unicode範囲で一括変換）
            s = s.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
            // よくある表記ゆれ（音声認識で漢字→ひらがなになりやすいもの）
            s = s.replace(/御/g, 'お');
            s = s.replace(/ヶ/g, 'が');
            s = s.replace(/ヵ/g, 'か');
            return s;
        }

        /** 正規表現用にエスケープ */
        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function checkMatch(text) {
            const target = targetInput.value.trim();
            if (!target || !isListening) return;
            const normTarget = normalizeForMatch(target);
            const normText = normalizeForMatch(text);
            // 部分一致だが、「新」+ 駅名（例: 新お茶の水）は別駅なので除外
            const escaped = escapeRegex(normTarget);
            const pattern = new RegExp(`(?<!新)${escaped}`);
            if (pattern.test(normText)) {
                triggerAlarm(text);
            }
        }

        function triggerAlarm(detectedText) {
            isListening = false;
            clearSpeechTimers();
            if (recognition) {
                try { recognition.stop(); } catch (e) {}
            }
            
            matchText.textContent = `「${detectedText}」を検知しました`;
            alarmPanel.classList.remove('hidden');
            alarmBox.classList.add('vibrate-active');

            // バイブレーション開始
            startVibration();
            
            // 視覚的なフィードバック
            statusText.textContent = '検知しました！';
            toggleBtn.classList.replace('bg-red-600', 'bg-green-600');
            toggleBtn.classList.remove('pulse');
        }

        function startVibration() {
            if (!isVibratePrefOn()) return;

            if (vibrationInterval) {
                clearInterval(vibrationInterval);
                vibrationInterval = null;
            }
            if (notifyRepeatTimer) {
                clearInterval(notifyRepeatTimer);
                notifyRepeatTimer = null;
            }
            if (typeof navigator.vibrate === 'function') {
                try { navigator.vibrate(0); } catch (e) { /* ignore */ }
            }
            closeAlarmNotificationsAndPageInstance();

            const longPattern = [500, 200, 500, 200, 500, 200, 500, 200, 500];
            const loopPattern = [600, 300, 600];

            if (typeof navigator.vibrate === 'function') {
                try {
                    navigator.vibrate(longPattern);
                } catch (e) { /* ignore */ }
                vibrationInterval = setInterval(() => {
                    try {
                        navigator.vibrate(loopPattern);
                    } catch (e) { /* ignore */ }
                }, 3200);
            }
            // 許可済みなら Service Worker / 通知の vibrate を併用（Web の vibrate だけが効かない端末向け）
            const canNotify = typeof Notification !== 'undefined' && Notification.permission === 'granted';
            if (canNotify) {
                showAlarmHapticNotification();
                notifyRepeatTimer = setInterval(() => {
                    showAlarmHapticNotification();
                }, 8000);
            }
        }

        function stopVibration() {
            if (vibrationInterval) {
                clearInterval(vibrationInterval);
                vibrationInterval = null;
            }
            if (notifyRepeatTimer) {
                clearInterval(notifyRepeatTimer);
                notifyRepeatTimer = null;
            }
            if (typeof navigator.vibrate === 'function') {
                try { navigator.vibrate(0); } catch (e) { /* ignore */ }
            }
            closeAlarmNotificationsAndPageInstance();
        }

        function startListening() {
            if (!SpeechRecognitionCtor) return;
            const station = targetInput.value.trim();
            if (!station) {
                alert('先に駅名を入力してください。');
                return;
            }

            saveStation(station);

            const beginMonitor = () => {
                if (isVibratePrefOn() && typeof navigator.vibrate === 'function') {
                    try { navigator.vibrate(15); } catch (e) { /* ignore */ }
                }

                clearSpeechTimers();
                hadRecognitionOnStart = false;
                lastInstanceCreatedAt = Date.now();
                isListening = true;
                transcriptLog.innerHTML = '';
                recognition = createRecognition();

                statusText.textContent = '監視中...';
                toggleBtn.classList.replace('bg-blue-600', 'bg-red-600');
                toggleBtn.classList.add('pulse');

                tryStartRecognition(0, { fromUserClick: true });
            };

            // 通知許可はジェスチャー内で確定させないと、アラーム時点で granted になっていないことがある
            if (
                isVibratePrefOn()
                && typeof Notification !== 'undefined'
                && Notification.permission === 'default'
            ) {
                Notification.requestPermission()
                    .finally(beginMonitor);
            } else {
                beginMonitor();
            }
        }

        function stopListening() {
            isListening = false;
            clearSpeechTimers();
            if (recognition) {
                try { recognition.stop(); } catch (e) {}
            }
            stopVibration();
            statusText.textContent = '監視を開始する';
            toggleBtn.classList.replace('bg-red-600', 'bg-blue-600');
            toggleBtn.classList.replace('bg-green-600', 'bg-blue-600');
            toggleBtn.classList.remove('pulse');
        }

        toggleBtn.addEventListener('click', () => {
            if (isListening || alarmBox.classList.contains('vibrate-active')) {
                stopListening();
            } else {
                startListening();
            }
        });

        stopAlarmBtn.addEventListener('click', () => {
            alarmPanel.classList.add('hidden');
            alarmBox.classList.remove('vibrate-active');
            stopListening();
        });

        vibrateToggle.checked = isVibratePrefOn();
        vibrateToggle.addEventListener('change', () => setVibratePref(vibrateToggle.checked));

        renderSavedStations();
    </script>
</body>
</html>
